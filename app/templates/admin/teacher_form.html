<!-- Add/Edit Teacher modal — included by teachers_list.html -->
<div class="modal-backdrop-custom" id="teacherModal">
  <div class="modal-box">
    <div class="modal-box-header">
      <h3 id="teacherModalTitle">Add Teacher</h3>
      <button type="button" class="modal-box-close" aria-label="Close">&times;</button>
    </div>
    <form id="teacherForm">
      <div class="modal-box-body">
        <input type="hidden" id="teacherId">
        <div class="form-group">
          <label class="form-label" for="teacherFullName">Full Name <span class="required">*</span></label>
          <input type="text" class="form-control" id="teacherFullName" required>
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="teacherEmail">Email <span class="required">*</span></label>
          <input type="email" class="form-control" id="teacherEmail" required>
        </div>
      </div>
      <div class="modal-box-footer">
        <button type="button" class="btn btn-secondary" data-modal-dismiss>Cancel</button>
        <button type="submit" class="btn btn-primary" id="teacherSaveBtn">
          <span class="btn-spinner" style="display:none;"></span>
          <span class="btn-label">Save Teacher</span>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Generated-password modal — shown once after create/reset, never persisted client-side -->
<div class="modal-backdrop-custom" id="generatedPasswordModal">
  <div class="modal-box">
    <div class="modal-box-header">
      <h3>Login Credentials Generated</h3>
      <button type="button" class="modal-box-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-box-body">
      <p class="text-muted">Share this password with the teacher now — it will not be shown again.</p>
      <div class="input-with-button">
        <input type="text" class="form-control" id="generatedPasswordDisplay" readonly>
      </div>
    </div>
    <div class="modal-box-footer">
      <button type="button" class="btn btn-primary" data-modal-dismiss>Done</button>
    </div>
  </div>
</div>
