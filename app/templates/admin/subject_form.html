<!-- Add/Edit Subject modal — included by subjects_list.html -->
<div class="modal-backdrop-custom" id="subjectModal">
  <div class="modal-box">
    <div class="modal-box-header">
      <h3 id="subjectModalTitle">Add Subject</h3>
      <button type="button" class="modal-box-close" aria-label="Close">&times;</button>
    </div>
    <form id="subjectForm">
      <div class="modal-box-body">
        <input type="hidden" id="subjectId">
        <div class="form-group">
          <label class="form-label" for="subjectName">Subject Name <span class="required">*</span></label>
          <input type="text" class="form-control" id="subjectName" required>
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="subjectCode">Subject Code</label>
          <input type="text" class="form-control" id="subjectCode" placeholder="e.g. MTH">
        </div>
      </div>
      <div class="modal-box-footer">
        <button type="button" class="btn btn-secondary" data-modal-dismiss>Cancel</button>
        <button type="submit" class="btn btn-primary" id="subjectSaveBtn">
          <span class="btn-spinner" style="display:none;"></span>
          <span class="btn-label">Save Subject</span>
        </button>
      </div>
    </form>
  </div>
</div>
