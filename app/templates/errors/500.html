<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server Error — School Result Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="icon" href="/static/images/favicon.ico">
</head>
<body>
  <div class="error-page">
    <div class="error-card">
      <div class="error-card-icon"><i class="bi bi-exclamation-octagon"></i></div>
      <div class="error-card-code">Error 500</div>
      <h1 class="error-card-title">Server Error</h1>
      <p class="error-card-message">Something went wrong on our end. Please try again in a moment.</p>
      <a href="/" class="btn btn-primary">Go to Sign In</a>
    </div>
  </div>
</body>
</html>
