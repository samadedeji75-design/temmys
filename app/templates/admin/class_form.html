<!-- Add Level modal -->
<div class="modal-backdrop-custom" id="levelModal">
  <div class="modal-box">
    <div class="modal-box-header">
      <h3>Add Level</h3>
      <button type="button" class="modal-box-close" aria-label="Close">&times;</button>
    </div>
    <form id="levelForm">
      <div class="modal-box-body">
        <div class="form-group mb-0">
          <label class="form-label" for="levelName">Level Name <span class="required">*</span></label>
          <input type="text" class="form-control" id="levelName" required placeholder="e.g. JSS 1">
        </div>
      </div>
      <div class="modal-box-footer">
        <button type="button" class="btn btn-secondary" data-modal-dismiss>Cancel</button>
        <button type="submit" class="btn btn-primary" id="levelSaveBtn">
          <span class="btn-spinner" style="display:none;"></span>
          <span class="btn-label">Save Level</span>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Add/Edit Arm modal -->
<div class="modal-backdrop-custom" id="armModal">
  <div class="modal-box">
    <div class="modal-box-header">
      <h3 id="armModalTitle">Add Arm</h3>
      <button type="button" class="modal-box-close" aria-label="Close">&times;</button>
    </div>
    <form id="armForm">
      <div class="modal-box-body">
        <input type="hidden" id="armId">
        <div class="form-group">
          <label class="form-label" for="armLevel">Level <span class="required">*</span></label>
          <select class="form-select" id="armLevel" required></select>
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="armName">Arm Name <span class="required">*</span></label>
          <input type="text" class="form-control" id="armName" required placeholder="e.g. A">
        </div>
      </div>
      <div class="modal-box-footer">
        <button type="button" class="btn btn-secondary" data-modal-dismiss>Cancel</button>
        <button type="submit" class="btn btn-primary" id="armSaveBtn">
          <span class="btn-spinner" style="display:none;"></span>
          <span class="btn-label">Save Arm</span>
        </button>
      </div>
    </form>
  </div>
</div>
